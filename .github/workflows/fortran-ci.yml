name: Fortran Tests

on:
  push:
    branches: [ main, ci-fix ]
  pull_request:
    branches: [ main, ci-fix ]
  merge_group:
    branches: [ main, ci-fix ]

env:
  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
  # Default-on oversubscribe so any ``mpirun`` invocation in this job
  # (the explicit ``-m mpi`` step + anything a test launches itself)
  # can map more ranks than GH-runner cores without ``--oversubscribe``
  # on every command line.
  OMPI_MCA_rmaps_base_oversubscribe: "1"
  PRTE_MCA_rmaps_default_mapping_policy: ":oversubscribe"

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

jobs:
  test-fortran:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-ci') }}
    # Three runners from one definition (shared setup, no duplication):
    #   * ``fast``  -- the routine sweep: every test EXCEPT ``mpi``,
    #                  ``long`` and ``integration`` (uploads coverage).
    #                  Keeps PR feedback quick.
    #   * ``heavy`` -- the ``long`` tests only: ICON built from source +
    #                  the ICON-O fparser single-TU extractions.
    #   * ``integration`` -- the ICON multi-node integration tests (per-call
    #                  orig-vs-binding bit-exact, VERY SHORT run) PLUS the
    #                  multi-rank ``mpi`` tests, run as SEPARATE steps.  Kept
    #                  off fast/heavy so neither the quick PR sweep nor the
    #                  ICON-from-source builds carry the mpirun-driven tests.
    strategy:
      fail-fast: false
      matrix:
        suite: [fast, heavy, integration]
    name: test-fortran (${{ matrix.suite }})
    runs-on: ubuntu-24.04
    # The heavy suite builds ICON from source and runs the ~9 GB-peak
    # fparser ocean extractions; the integration suite likewise builds ICON
    # (same bear-wrapped configure + make) before its SHORT test run -- give
    # both generous headroom.
    # ``fast`` is the whole non-long unit sweep; it has grown to ~65-70 min of
    # all-passing tests and was tripping the old 60 min wall at ~89% (a timeout,
    # never a test failure), so give it 90 min of headroom.
    timeout-minutes: ${{ (matrix.suite == 'heavy' || matrix.suite == 'integration') && 180 || 90 }}
    env:
      # Disable hwloc's GL/X11 backend so ``from mpi4py import MPI``
      # (MPI_Init -> hwloc topology) doesn't probe a (possibly absent /
      # hung) X display and block.  CPU/PCI topology -- all MPI needs --
      # is unaffected.
      HWLOC_COMPONENTS: "-gl"
      # Anti-hang MPI transport pinning for the single-node GH runner: used by
      # the ``integration`` suite's relocated ``-m mpi`` step (and any test
      # that shells out to mpirun).  The ob1 PML over the shared-memory
      # ``vader`` + ``self`` BTLs is the reliable single-node path -- it avoids
      # UCX's FUSE/openib probing, a known MPI_Init hang source on CI.  Harmless
      # on the non-MPI fast/heavy steps (the vars are simply unused there).
      # ``MPI4PY_RC_INITIALIZE=0`` is deliberately NOT set: the mpi tests do
      # ``from mpi4py import MPI; MPI.COMM_WORLD`` and rely on mpi4py's
      # import-time MPI_Init.
      OMPI_MCA_pml: "ob1"
      OMPI_MCA_btl: "self,vader"
      UCX_VFS_ENABLE: "n"
    steps:
    - uses: actions/checkout@v4
      with:
        # Don't fetch submodules on the shared checkout: only the heavy suite
        # needs the icon-model submodule (the fast lane's tests never touch it),
        # so the fast lane skips the ICON clone entirely.  The heavy suite
        # shallow + recursive checks it out in a dedicated step below.
        submodules: false

    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install LLVM / MLIR / flang 21 + Fortran toolchain
      run: |
        # The HLFIR bridge requires LLVM/flang 21 (flang-new-21 -fc1
        # -emit-hlfir).  libflang-21-dev provides BOTH the FIR/HLFIR
        # static libs the bridge links (libFIRTransforms.a,
        # libFortranSupport.a, ...) AND the flang headers it #includes
        # (flang/Optimizer/HLFIR/HLFIROps.h); without it CMake configures
        # but the link fails.  Provenance verified via dpkg -S on a
        # known-good local build.
        wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
        sudo add-apt-repository -y "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-21 main"
        sudo apt-get update
        sudo apt-get install -y \
          llvm-21-dev libmlir-21-dev mlir-21-tools \
          libflang-21-dev flang-21 clang-21 \
          build-essential cmake ninja-build gfortran libgomp1 \
          libopenmpi-dev openmpi-bin \
          libnetcdff-dev libnetcdf-dev libhdf5-dev \
          libfyaml-dev libxml2-dev liblapack-dev libblas-dev \
          pkg-config perl python3 \
          bear autoconf automake m4 rsync zlib1g-dev
        # The ICON-integration tests configure + ``make`` the
        # icon-model submodule on demand (the ``icon_build`` fixture).
        # GRIB2/eccodes is DISABLED in that build (the dycore tests
        # need only compiled ``.mod`` files, and eccodes' Fortran
        # binding isn't shipped by stock ``libeccodes-dev``), so the
        # libs above (netcdf-fortran, serial HDF5, fyaml, xml2,
        # lapack/blas) are the full ICON-build dependency set.
        # bear + autotools drive the tier-3 prebuilt-HLFIR autotools
        # project (tests/prebuilt_hlfir/jacobi): bear -- make captures
        # compile_commands.json the way it would for ICON's build.
        echo "/usr/lib/llvm-21/bin" >> "$GITHUB_PATH"
        # apt.llvm.org installs the binary as flang-new-21 in
        # /usr/lib/llvm-21/bin (on PATH above).  Fall back to a symlink
        # only if a packaging change drops that name.
        command -v flang-new-21 || sudo ln -sf /usr/lib/llvm-21/bin/flang-21 /usr/local/bin/flang-new-21
        # OpenMPI ships the Fortran wrapper as both ``mpifort`` and the legacy
        # ``mpif90``; the multi-rank MPI tests probe ``mpif90`` by name.  Symlink
        # it to mpifort if a packaging change ever drops the legacy alias.
        command -v mpif90 || sudo ln -sf "$(command -v mpifort)" /usr/local/bin/mpif90
        # Use the runner's default gfortran (older GCC, 132-col
        # free-form limit).  gfortran-15 is not in the noble apt repo,
        # and the version no longer matters: the bindings e2e tests
        # pass -ffree-line-length-none (FLANG_PORTABLE_FFLAGS) so the
        # long generated signatures compile on any gfortran.

    - name: Verify toolchain is complete (fail fast on a missing dependency)
      run: |
        # ``flang-new-21`` is on PATH only in steps AFTER the one that appended
        # /usr/lib/llvm-21/bin to $GITHUB_PATH, so this must be its own step.
        # Asserting every required tool up front turns a silently-skipped test
        # (e.g. "needs flang-new-21 + OpenMPI") into a loud, fail-fast setup
        # error -- so a provisioning regression can never masquerade as a green
        # run with hidden skips.
        missing=0
        # flang HLFIR bridge + Fortran/MPI/C-C++ toolchain + ICON build tools
        # (mpicc/mpicxx/mpifort + make/perl/python3 drive the icon_build fixture).
        for t in flang-new-21 clang-21 gfortran gcc g++ make cmake ninja \
                 mpicc mpicxx mpifort mpif90 perl python3 \
                 bear autoconf automake aclocal m4 rsync pkg-config; do
          if command -v "$t" >/dev/null 2>&1; then
            printf '  ok    %-12s %s\n' "$t" "$(command -v "$t")"
          else
            printf '  MISS  %s\n' "$t"; missing=1
          fi
        done
        # OpenMPI Fortran headers the ``mpi`` library stub is built against
        # (find_openmpi_include probes for mpif-config.h).
        test -f /usr/lib/x86_64-linux-gnu/openmpi/include/mpif-config.h \
          || { echo '  MISS  openmpi mpif-config.h'; missing=1; }
        [ "$missing" = 0 ] || { echo 'Toolchain incomplete -- see MISS lines above'; exit 1; }

    - name: Install Python dependencies
      run: |
        rm -f ~/.dace.conf
        rm -rf .dacecache tests/.dacecache
        python -m pip install --upgrade pip
        # nanobind is a CMake-configure-time requirement of the bridge;
        # meson is the f2py backend on Python >=3.12 (numerical refs) AND
        # the build backend for the icon-model meson configure path.
        pip install nanobind numpy meson ninja
        pip install -e ".[testing]" pytest-xdist coverage
        # mpi4py (built against the openmpi installed above) drives the
        # multi-rank MPI Send/Recv e2e via dace.sdfg.utils.distributed_compile.
        MPICC=mpicc pip install mpi4py

    - name: Build HLFIR bridge
      run: |
        # First access of a builder-backed symbol triggers the CMake build.
        python -c "import dace_fortran; dace_fortran.SDFGBuilder"

    # ----- fast runner: the routine sweep (no mpi, no long, no integration) -----
    - name: Run Fortran frontend tests (fast sweep)
      if: ${{ matrix.suite == 'fast' }}
      run: |
        export COVERAGE_RCFILE=`pwd`/.coveragerc
        # Main xdist sweep, excluding the multi-rank ``mpi`` tests (they
        # need mpirun, not an xdist worker), the ``long`` tests
        # (ICON-from-source builds + ICON-O fparser extractions -- run on
        # the ``heavy`` runner below) and the ``integration`` tests (ICON
        # orig-vs-binding bit-exact -- run on the ``integration`` runner so
        # they never leak into the quick PR sweep).  ``--dist loadgroup``
        # honours the ``xdist_group`` markers so grouped tests share one worker.
        pytest -n auto --dist loadgroup -m "not mpi and not long and not integration" \
          --cov-report=xml --cov=dace_fortran --tb=short tests/
        coverage report || true
        coverage xml || true
        reachable=0
        ping -W 2 -c 1 codecov.io || reachable=$?
        if [ $reachable -eq 0 ]; then
          curl -Os https://uploader.codecov.io/latest/linux/codecov && chmod +x codecov && ./codecov || true
        else
          echo "Codecov.io is unreachable"
        fi

    # ----- heavy + integration runners: check out the ICON submodule (public externals only) -----
    - name: Check out icon-model submodule (heavy + integration)
      if: ${{ matrix.suite == 'heavy' || matrix.suite == 'integration' }}
      run: |
        # icon-model is pinned to the ICON release tag icon-2026.04-public
        # (recorded in .gitmodules).  Shallow + recursive: the icon_build fixture
        # and setup_icon_dycore.sh both CONFIGURE + ``make`` ICON, which compiles
        # its externals, so every external must be present.  All ICON externals
        # are publicly cloneable from gitlab.dkrz.de and ``--depth 1`` keeps the
        # whole tree small (~640 MB).  ``_have_icon()`` keys on
        # mo_solve_nonhydro.f90, so this is what flips the ICON-from-source
        # ``long`` tests AND the ``integration`` tests from skipped to run.
        git submodule update --init --recursive --depth 1 tests/icon/full/icon-model

    - name: Generate dycore compile_commands.json (heavy + integration)
      if: ${{ matrix.suite == 'heavy' || matrix.suite == 'integration' }}
      run: |
        # Mirrors heavy for the integration runner: the short ICON integration
        # tests need the same per-TU ICON compile flags, so building the fixture
        # here keeps them RUNNING rather than silently skipping.
        # The dycore-parse test (tests/icon/dycore/test_solve_nonhydro_parse.py)
        # emits HLFIR for ICON's mo_solve_nonhydro driven by the per-TU
        # -cpp / -I / -D flags captured in a REAL ICON build's
        # compile_commands.json.  ``bear`` wraps a configure + ``make`` of the
        # icon-model submodule (make is allowed to fail after the dycore TU is
        # reached -- we only need its compile command), populating
        # tests/icon/dycore/.icon_build/compile_commands.json so the test RUNS
        # instead of skipping.  SKIP_APT=1: deps are already installed above.
        SKIP_APT=1 bash tests/icon/dycore/setup_icon_dycore.sh

    # ----- heavy runner: long tests only (mpi moved to the integration runner) -----
    - name: Run long tests (ICON-from-source + ICON-O fparser extractions)
      if: ${{ matrix.suite == 'heavy' }}
      run: |
        # The ``long`` tests only.  ``not mpi`` and ``not integration`` keep the
        # mpirun-driven families off this runner -- they now run on the
        # ``integration`` runner below (``long`` is disjoint from the SHORT
        # ``integration`` tests, so ``not integration`` is defensive: it pins
        # the invariant that integration tests run on exactly one runner).
        # ``--dist loadgroup`` keeps each heavy family on ONE worker (ICON is
        # configured + built exactly once via the ``icon_build`` group; the
        # ICON-O fparser extractions share the ``ocean_fparser`` group and run
        # one-at-a-time, each in its own memory-capped subprocess), so at most
        # one of each runs concurrently.
        pytest -n auto --dist loadgroup -m "long and not mpi and not integration" \
          -p no:cacheprovider --tb=short tests/

    # ----- integration runner: multi-rank mpi tests + short ICON integration tests -----
    - name: Run multi-rank MPI tests under mpirun (integration only)
      if: ${{ matrix.suite == 'integration' }}
      run: |
        # Relocated here from the heavy runner: the 2-rank/pair halo-exchange
        # ``sync_patch_array`` e2e and the other ``mpi``-marked multi-rank
        # tests.  4 ranks oversubscribed onto the runner's cores (GH runners
        # have few slots, but the mpi tests are tiny); ``-n 4`` is required so
        # the non-default-communicator e2e (MPI_Comm_split by rank%2) actually
        # runs -- it skips below 4; the ring tests run a ring of `size` and
        # work at 4 too.  Any ICON integration test that is ITSELF multi-rank
        # carries the ``mpi`` marker (per the marker scheme) and therefore runs
        # HERE under mpirun.  Anti-hang MPI transport env (OMPI_MCA_pml/btl,
        # UCX_VFS_ENABLE, HWLOC_COMPONENTS) is set at the job level above.
        mpirun --oversubscribe -n 4 python -m pytest -m mpi \
          -p no:cacheprovider --tb=short tests/

    - name: Run short ICON integration tests (integration only)
      if: ${{ matrix.suite == 'integration' }}
      run: |
        # The SHORT ICON integration tests that are NOT multi-rank: per-call
        # duplicate-data original-vs-binding bit-exact checks.  Run as PLAIN
        # pytest, NOT under mpirun -- a test needing mpirun coordination carries
        # the ``mpi`` marker and ran in the step above; launching a non-MPI-aware
        # pytest under ``mpirun -n 4`` would spawn 4 uncoordinated sessions that
        # clobber each other's build / .dacecache dirs.  Sequential (no xdist):
        # these build gfortran reference libs + SDFGs and the run is short, so
        # serial execution avoids parallel-build races for a negligible cost.
        # Together with the step above this covers ``-m "integration or mpi"``
        # with no test run twice (mpi-and-integration tests run only above).
        # ``|| [ $? -eq 5 ]`` tolerates pytest's exit-5 (no tests collected) so
        # an empty integration set never reds the lane -- a guard against a
        # future removal of every integration test silently re-breaking CI.
        python -m pytest -m "integration and not mpi" \
          -p no:cacheprovider --tb=short tests/ || [ $? -eq 5 ]
